openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: JoJo Foods API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: menu
    description: Menu operations
  - name: orders
    description: Order operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /menu:
    get:
      operationId: getMenuItems
      tags: [menu]
      summary: Get all menu items
      description: Returns all menu items grouped by category
      responses:
        "200":
          description: List of menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"
  /menu/{id}:
    get:
      operationId: getMenuItem
      tags: [menu]
      summary: Get a single menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Menu item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "404":
          description: Not found
  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Bad request
    get:
      operationId: getOrders
      tags: [orders]
      summary: Get all orders
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get a single order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    MenuItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
          enum: [burgers, pizza, sushi, shawarma]
        imageUrl:
          type: string
        popular:
          type: boolean
        spicy:
          type: boolean
      required:
        - id
        - name
        - description
        - price
        - category
        - popular
        - spicy
    OrderItem:
      type: object
      properties:
        menuItemId:
          type: integer
        quantity:
          type: integer
        notes:
          type: string
      required:
        - menuItemId
        - quantity
    CreateOrderRequest:
      type: object
      properties:
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: string
        deliveryAddress:
          type: string
        deliveryZone:
          type: string
          enum: [zone_a, zone_b, zone_c, pickup]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        specialInstructions:
          type: string
      required:
        - customerName
        - customerPhone
        - customerEmail
        - deliveryZone
        - items
    Order:
      type: object
      properties:
        id:
          type: integer
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: string
        deliveryAddress:
          type: string
        deliveryZone:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        specialInstructions:
          type: string
        totalPrice:
          type: number
        deliveryFee:
          type: number
        status:
          type: string
          enum: [pending, confirmed, preparing, out_for_delivery, delivered, cancelled]
        estimatedDeliveryTime:
          type: integer
          description: Estimated delivery time in minutes
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - customerName
        - customerPhone
        - customerEmail
        - deliveryZone
        - items
        - totalPrice
        - deliveryFee
        - status
        - estimatedDeliveryTime
        - createdAt
